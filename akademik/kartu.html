<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak Kartu — SMPN 05 Sarolangun</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --teal:#0a7566;--teal2:#0d9a88;--merah:#c0392b;
  --putaka:#7b3fa0;--putaka2:#9b59b6;--krem:#f0ede8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#eef2f7;color:#1e2a3a;}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,var(--teal),#0d3b6e);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 2px 16px rgba(0,0,0,0.2);}
.topbar-title strong{display:block;font-size:14px;font-weight:800;color:#fff;}
.topbar-title span{font-size:11px;color:rgba(255,255,255,0.7);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.topbar a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:12px;font-weight:600;}

/* KONTROL */
.kontrol{max-width:1100px;margin:14px auto;padding:0 16px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:10px;font-weight:700;color:#5a6a7e;text-transform:uppercase;letter-spacing:0.7px;}
.fg input,.fg select{padding:8px 12px;border:2px solid #dde3ee;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;outline:none;background:#fff;transition:border-color 0.2s;}
.fg input:focus,.fg select:focus{border-color:var(--teal2);}
.btn{padding:8px 16px;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn-print{background:var(--merah);color:#fff;}
.btn-print:hover{background:#a93226;}
.btn-foto{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;background:#e67e22;color:#fff;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;}
.btn-foto:hover{background:#d35400;}
.tipe-toggle{display:flex;gap:6px;}
.tipe-btn{padding:8px 14px;border:2px solid #dde3ee;background:#fff;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:#5a6a7e;transition:all 0.2s;}
.tipe-btn.active.pelajar{background:var(--teal2);color:#fff;border-color:var(--teal2);}
.tipe-btn.active.pustaka{background:var(--putaka2);color:#fff;border-color:var(--putaka2);}

/* ZIP PANEL */
.zip-panel{max-width:1100px;margin:0 auto 10px;padding:0 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.zip-group{display:flex;align-items:center;gap:8px;background:#fff;border:2px solid #dde3ee;border-radius:10px;padding:7px 14px;}
.zip-group label{font-size:12px;font-weight:700;color:#5a6a7e;white-space:nowrap;}
.zip-group select{border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:#1e2a3a;outline:none;cursor:pointer;}
.btn-zip{background:#27ae60;color:#fff;}
.btn-zip:hover{background:#219a52;}

/* INFO + CB */
.info-bar{max-width:1100px;margin:0 auto 6px;padding:0 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.info-count{font-size:12px;color:#5a6a7e;}
.info-count strong{color:var(--teal2);}
.info-sel{font-size:12px;color:#27ae60;font-weight:700;}
.cb-panel{max-width:1100px;margin:0 auto 10px;padding:0 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.cb-panel label{font-size:12px;color:#5a6a7e;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}

/* AREA KARTU */
.kartu-area{max-width:1100px;margin:0 auto;padding:0 16px 40px;display:flex;flex-wrap:wrap;gap:20px;}
.kartu-unit{display:flex;flex-direction:column;gap:4px;}
.kartu-unit-header{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:#9aabb8;text-transform:uppercase;letter-spacing:1px;}
.kartu-unit-header input[type=checkbox]{cursor:pointer;width:14px;height:14px;}
.kartu-pair{display:flex;gap:8px;}

/* DL PER KARTU */
.dl-row{display:flex;gap:6px;margin-top:3px;}
.btn-dl{padding:5px 10px;border:none;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn-dl-d{background:#1565c0;color:#fff;}
.btn-dl-d:hover{background:#0d3b6e;}
.btn-dl-db{background:#6d4c41;color:#fff;}
.btn-dl-db:hover{background:#4e342e;}

/* ════ KARTU DEPAN 323x204px ════ */
.kartu-depan{
  width:323px;height:204px;border-radius:10px;overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,0.15);position:relative;
  background:var(--krem);flex-shrink:0;
}
.pustaka .kartu-depan{background:#f8f5fc;}

/* HEADER */
.kd-header{
  position:absolute;top:0;left:0;right:0;height:96px;
  display:flex;align-items:center;padding:0 12px;gap:0;overflow:hidden;
}
.pelajar .kd-header{background:linear-gradient(135deg,#0a7566 0%,#0d9a88 55%,#0a6e5e 100%);}
.pustaka .kd-header{background:linear-gradient(135deg,#7b3fa0 0%,#9b59b6 55%,#6c3483 100%);}
.kd-header::before{content:'';position:absolute;right:80px;top:-10px;width:50px;height:120px;background:rgba(255,255,255,0.05);transform:rotate(12deg);pointer-events:none;}
.kd-header::after{content:'';position:absolute;right:50px;top:-10px;width:28px;height:120px;background:rgba(255,255,255,0.04);transform:rotate(12deg);pointer-events:none;}

/* Dekorasi miring kiri atas via pseudo tidak bisa multiple, pakai div */
.kd-deko-kiri{position:absolute;top:0;left:0;width:0;height:0;pointer-events:none;}
.kd-deko-kiri::before{content:'';position:absolute;top:0;left:0;width:0;height:0;border-style:solid;border-width:96px 0 0 130px;border-color:transparent transparent transparent rgba(255,255,255,0.07);}

.kd-header-txt{flex:1;text-align:right;padding:0 10px 0 0;}
.kd-header-txt .judul{font-size:13px;font-weight:900;color:#f8c400;letter-spacing:2px;text-transform:uppercase;}
.kd-header-txt .sekolah{font-size:11px;font-weight:800;color:#fff;line-height:1.2;margin-top:1px;}
.kd-header-txt .alamat{font-size:5.8px;color:rgba(255,255,255,0.82);line-height:1.4;margin-top:2px;}

.kd-divider{width:1.5px;height:52px;background:rgba(255,255,255,0.4);flex-shrink:0;margin-right:10px;}

/* Logo kanan mix-blend-mode multiply */
.kd-logo-right{width:54px;height:54px;flex-shrink:0;}
.kd-logo-right img{width:100%;height:100%;object-fit:contain;}

/* FOTO overlap naik ke header */
.kd-foto{
  position:absolute;top:50px;left:14px;
  width:80px;height:106px;
  background:#c8d0da;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.2);z-index:2;
}
.kd-foto img{width:100%;height:100%;object-fit:cover;object-position:top center;}
.kd-foto .avatar{font-size:24px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
.pelajar .kd-foto .avatar{background:linear-gradient(135deg,var(--teal),#0d3b6e);}
.pustaka .kd-foto .avatar{background:linear-gradient(135deg,var(--putaka),#4a235a);}

/* NISN STRIPE dalam area hijau, pendek */
.kd-nisn-stripe{
  position:absolute;top:72px;left:104px;right:0;height:22px;
  background:var(--merah);display:flex;align-items:center;padding:0 12px;z-index:1;
}
.pustaka .kd-nisn-stripe{background:var(--putaka);}
.kd-nisn-no{font-size:14px;font-weight:800;color:#fff;letter-spacing:2px;}

/* NAMA NISN TTL bawah foto */
.kd-data{position:absolute;top:162px;left:14px;right:160px;}
.kd-nama{font-size:12px;font-weight:800;line-height:1.2;margin-bottom:4px;text-transform:uppercase;}
.pelajar .kd-nama{color:var(--teal);}
.pustaka .kd-nama{color:var(--putaka);}
.kd-nisn-txt{font-size:8.5px;color:#333;margin-bottom:2px;font-weight:600;}
.kd-ttl{font-size:8px;color:#555;line-height:1.4;}

/* BARCODE lebih besar */
.kd-barcode{position:absolute;bottom:4px;left:12px;width:160px;height:30px;}
.kd-barcode svg{width:100%;height:100%;}

/* QR geser bawah */
.kd-qr{position:absolute;right:5px;top:102px;width:70px;height:70px;}
.kd-qr canvas,.kd-qr img{width:70px!important;height:70px!important;}

/* INFO SEKOLAH hampir sejajar barcode, ada jarak dengan QR */
.kd-sekolah{
  position:absolute;right:8px;bottom:6px;
  text-align:right;font-size:6.5px;color:#555;line-height:1.7;
}
.kd-sekolah strong{display:block;font-size:7px;color:#0d3b6e;font-weight:800;}
.kd-sekolah .tahun{font-size:6px;color:#999;}

.kartu-depan{
  width:370px;height:234px;border-radius:10px;overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,0.15);position:relative;
  background:var(--krem);flex-shrink:0;
}
.pustaka .kartu-depan{background:#f8f5fc;}

/* ════ KARTU BELAKANG ════ */
.kartu-belakang{
  width:360px;height:227px;border-radius:10px;overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,0.15);
  background:var(--krem);display:flex;flex-direction:column;flex-shrink:0;
}
.pustaka .kartu-belakang{background:#f8f5fc;}

.kb-strip-top{height:20px;}
.pelajar .kb-strip-top{background:linear-gradient(135deg,#0a7566,#0d9a88);}
.pustaka .kb-strip-top{background:linear-gradient(135deg,#7b3fa0,#9b59b6);}
.kb-strip-red{height:5px;background:var(--merah);}
.pustaka .kb-strip-red{background:var(--putaka);}

.kb-body{
  flex:1;display:flex;flex-direction:column;
  align-items:center;padding:8px 24px 4px;position:relative;overflow:hidden;
}
.kb-watermark{
  position:absolute;top:-10px;left:-20px;
  width:140px;height:140px;opacity:0.07;pointer-events:none;
  
}
.kb-watermark img{width:100%;height:100%;object-fit:contain;}
.kb-logo{width:38px;height:38px;object-fit:contain;margin-bottom:6px;}
.kb-rules{text-align:center;font-size:7px;color:#3a4a5a;line-height:1.85;}
.kb-rules p{margin-bottom:2px;}
.kb-rules .bold{display:block;font-weight:800;margin-top:1px;}
.pelajar .kb-rules .bold{color:var(--teal);}
.pustaka .kb-rules .bold{color:var(--putaka);}

/* Footer: hijau full, merah di kiri tidak sampai kanan */
.kb-footer{position:relative;height:44px;background:var(--teal);overflow:hidden;}
.pustaka .kb-footer{background:var(--putaka2);}
/* Merah di kiri */
.kb-footer::before{
  content:'';position:absolute;top:0;left:0;bottom:0;width:300px;
  background:var(--merah);
}
.pustaka .kb-footer::before{background:var(--putaka);}
/* Miring hijau kanan bawah - arah ke kanan (dari kiri-atas ke kanan-bawah) */
.kb-footer::after{
  content:'';position:absolute;top:0;right:0;
  width:0;height:0;
  border-style:solid;
  border-width:0 0 44px 90px;
  border-color:transparent transparent var(--teal) transparent;
}
.pustaka .kb-footer::after{border-bottom-color:var(--putaka2);}

.kb-footer-name{position:relative;z-index:1;font-size:9px;font-weight:800;color:#fff;text-transform:uppercase;padding:7px 12px 1px;}
.kb-footer-addr{position:relative;z-index:1;font-size:6.5px;color:rgba(255,255,255,0.88);padding:0 12px;}

/* Strip hijau tipis bawah */
.kb-footer-bottom{height:5px;}
.pelajar .kb-footer-bottom{background:var(--teal);}
.pustaka .kb-footer-bottom{background:var(--putaka);}

.kartu-belakang{
  width:370px;height:234px;border-radius:10px;overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,0.15);
  background:var(--krem);display:flex;flex-direction:column;flex-shrink:0;
}
.pustaka .kartu-belakang{background:#f8f5fc;}

/* PRINT */
@media print{
  html,body{margin:0;padding:0;background:#fff;}
  .no-print{display:none!important;}
  .kartu-area{max-width:none;padding:0;margin:0;gap:6px;}
  .kartu-unit{display:inline-flex!important;flex-direction:column;margin:2mm;page-break-inside:avoid;}
  .kartu-pair{display:flex;gap:4px;}
  .kartu-depan,.kartu-belakang{width:86mm!important;height:54mm!important;box-shadow:none!important;border-radius:0!important;}
}

/* ZIP PROGRESS */
#zipProgress{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#zipProgress.show{display:flex;}
#zipBar{width:360px;height:10px;background:#333;border-radius:8px;overflow:hidden;}
#zipBarFill{height:100%;background:#27ae60;width:0%;transition:width 0.15s;}
#zipMsg{color:#fff;font-size:14px;font-weight:700;}
#zipSub{color:rgba(255,255,255,0.7);font-size:12px;}
</style>
</head>
<body>

<div id="zipProgress">
  <div id="zipMsg">Menyiapkan...</div>
  <div id="zipBar"><div id="zipBarFill"></div></div>
  <div id="zipSub"></div>
</div>

<div class="topbar no-print">
  <div class="topbar-title">
    <strong>Cetak Kartu — SMP Negeri 05 Sarolangun</strong>
    <span>Kartu Pelajar &amp; Kartu Pustaka</span>
  </div>
  <div class="topbar-right">
    <label class="btn-foto">
      📷 Upload Foto
      <input type="file" id="inputFoto" accept="image/*" multiple style="display:none" onchange="handleUploadFoto(this)">
    </label>
    <span id="infoFoto" style="font-size:11px;color:rgba(255,255,255,0.7);"></span>
    <a href="absensi.html">← Absensi</a>
  </div>
</div>

<div class="kontrol no-print">
  <div class="fg">
    <label>Tipe Kartu</label>
    <div class="tipe-toggle">
      <button class="tipe-btn active pelajar" id="btnPelajar" onclick="setTipe('pelajar')">&#x1FAA7; Pelajar</button>
      <button class="tipe-btn pustaka" id="btnPustaka" onclick="setTipe('pustaka')">&#x1F4DA; Pustaka</button>
    </div>
  </div>
  <div class="fg">
    <label>Filter Kelas</label>
    <select id="filterKelas" onchange="filterSiswa()">
      <option value="">Semua Kelas</option>
    </select>
  </div>
  <div class="fg">
    <label>Cari Siswa</label>
    <input type="text" id="inputCari" placeholder="Nama atau NISN..." style="width:190px;" oninput="filterSiswa()">
  </div>
  <button class="btn btn-print no-print" onclick="window.print()">&#x1F5A8; Print</button>
</div>

<div class="zip-panel no-print">
  <div class="zip-group">
    <label>&#x1F4E6; ZIP Kolektif:</label>
    <select id="zipMode">
      <option value="depan">Depan saja</option>
      <option value="both">Depan + Belakang</option>
    </select>
    <button class="btn btn-zip" onclick="downloadZip()">Unduh ZIP</button>
  </div>
</div>

<div class="info-bar no-print">
  <div class="info-count" id="infoCount"></div>
  <div class="info-sel" id="infoSel"></div>
</div>
<div class="cb-panel no-print">
  <label><input type="checkbox" id="cekSemua" onchange="toggleSemua(this)"> Pilih Semua Tampil</label>
  <span style="color:#ccc;">|</span>
  <span style="font-size:11px;color:#9aabb8;">Centang untuk ZIP selektif &middot; Unduh 1 kartu pakai tombol di bawah kartu</span>
</div>

<div class="kartu-area" id="kartuArea">
  <div style="text-align:center;padding:60px;color:#9aabb8;width:100%;">
    <div style="font-size:36px;margin-bottom:12px;">&#x1F504;</div>
    <p>Memuat data siswa...</p>
  </div>
</div>

let TOKEN = sessionStorage.getItem('absensi_token') || localStorage.getItem('absensi_token_shared') || '';
let allSiswa = [], tampilSiswa = [], tipeKartu = 'pelajar';
const fotoMap = {}, selectedSet = new Set();

if (!TOKEN) {
  TOKEN = localStorage.getItem('absensi_token_shared');
}
if (!TOKEN) {
  window.location.href = 'login.html';
}
window.addEventListener('load', async () => { await muatSiswa(); });

function formatTgl(tgl) {
  if (!tgl) return '';
  const bln = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const d = new Date(tgl);
  if (!isNaN(d.getTime())) return d.getDate() + ' ' + bln[d.getMonth()] + ' ' + d.getFullYear();
  return tgl;
}

function handleUploadFoto(input) {
  const files = Array.from(input.files);
  let loaded = 0;
  const info = document.getElementById('infoFoto');
  info.textContent = '⏳ ' + files.length + ' foto...';
  files.forEach(file => {
    const nisn = file.name.replace(/\.[^.]+$/, '').trim();
    const reader = new FileReader();
    reader.onload = e => {
      fotoMap[nisn] = e.target.result;
      fotoMap[nisn.replace(/^0+/, '')] = e.target.result;
      loaded++;
      if (loaded === files.length) {
        info.textContent = '✅ ' + Object.keys(fotoMap).length + ' foto siap';
        renderKartu(tampilSiswa);
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

async function muatSiswa() {
  try {
    const url = SCRIPT_URL + '?action=getSiswa&token=' + TOKEN;
    const r = await fetch(url);
    const d = await r.json();
    if (!d.ok) { window.location.href = 'login.html'; return; }
    allSiswa = d.data;
    const kelas = [...new Set(allSiswa.map(s => s.kelas).filter(Boolean))].sort();
    const sel = document.getElementById('filterKelas');
    kelas.forEach(k => {
      const opt = document.createElement('option');
      opt.value = k; opt.textContent = k; sel.appendChild(opt);
    });
    tampilSiswa = allSiswa;
    renderKartu(tampilSiswa);
  } catch(e) {
    document.getElementById('kartuArea').innerHTML = '<div style="text-align:center;padding:40px;color:#e53935;">Gagal memuat data: ' + e.message + '</div>';
  }
}

function setTipe(tipe) {
  tipeKartu = tipe;
  document.getElementById('btnPelajar').className = 'tipe-btn pelajar' + (tipe === 'pelajar' ? ' active' : '');
  document.getElementById('btnPustaka').className = 'tipe-btn pustaka' + (tipe === 'pustaka' ? ' active' : '');
  renderKartu(tampilSiswa);
}

function filterSiswa() {
  const q = document.getElementById('inputCari').value.toLowerCase();
  const kelas = document.getElementById('filterKelas').value;
  tampilSiswa = allSiswa.filter(s =>
    (!q || s.nama.toLowerCase().includes(q) || String(s.nisn).includes(q)) &&
    (!kelas || s.kelas === kelas)
  );
  renderKartu(tampilSiswa);
}

function toggleSiswa(nisn, checked) {
  if (checked) selectedSet.add(nisn); else selectedSet.delete(nisn);
  updateSel();
}
function toggleSemua(cb) {
  tampilSiswa.forEach(s => {
    if (cb.checked) selectedSet.add(String(s.nisn));
    else selectedSet.delete(String(s.nisn));
  });
  document.querySelectorAll('.cb-siswa').forEach(c => c.checked = cb.checked);
  updateSel();
}
function updateSel() {
  const el = document.getElementById('infoSel');
  el.textContent = selectedSet.size > 0 ? ('✅ ' + selectedSet.size + ' dipilih') : '';
}

function renderKartu(data) {
  const area = document.getElementById('kartuArea');
  document.getElementById('infoCount').innerHTML =
    'Menampilkan <strong>' + data.length + '</strong> dari <strong>' + allSiswa.length + '</strong> siswa';
  if (!data.length) {
    area.innerHTML = '<div style="text-align:center;padding:40px;color:#9aabb8;width:100%;">Tidak ada siswa ditemukan</div>';
    return;
  }
  area.innerHTML = data.map((s, i) => buatKartuHTML(s, i)).join('');
  data.forEach((s, i) => {
    const qrEl = document.getElementById('qr-' + i);
    if (qrEl) {
      qrEl.innerHTML = '';
      new QRCode(qrEl, { text: String(s.nisn), width: 64, height: 64, colorDark: '#000', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.M });
    }
    const bcEl = document.getElementById('bc-' + i);
    if (bcEl) {
      try { JsBarcode(bcEl, String(s.nisn), { format: 'CODE128', width: 1.0, height: 24, displayValue: false, margin: 0, lineColor: '#1e2a3a' }); } catch(e) {}
    }
  });
  updateSel();
}

  const cls = tipeKartu;

            <div class="alamat">Jl. Diponegoro No. 01 Desa Bukit Talang Mas, Kec. Singkut,<br>Kab. Sarolangun Prov. Jambi</div>
          </div>
          <div class="kd-divider"></div>
          <div class="kd-logo-right"><img src="${LOGO_URL}" alt="Logo"></div>
        </div>
        <div class="kd-foto">${fotoHtml}</div>
        <div class="kd-nisn-stripe"><span class="kd-nisn-no">${s.nisn}</span></div>
        <div class="kd-qr" id="qr-${i}"></div>
        <div class="kd-sekolah">

          <span class="tahun">@${tahun}</span>

        <div class="kd-data">
          <div class="kd-nama">${s.nama}</div>

      <!-- BELAKANG -->
      <div class="kartu-belakang" id="belakang-${i}">
        <div class="kb-strip-top"></div>
        <div class="kb-strip-red"></div>
        <div class="kb-body">

      <button class="btn-dl btn-dl-db" onclick="dlSatu(${i},true)">&#x2B07; Depan+Belakang</button>
    </div>
  </div>`;
}

async function dlSatu(i, withBelakang) {
  const elD = document.getElementById('depan-' + i);
  const elB = document.getElementById('belakang-' + i);
  if (!elD) return;
  const unit = elD.closest('.kartu-unit');
  const nisn = unit.dataset.nisn || i;
  const namaEl = unit.querySelector('.kd-nama');
  const nama = (namaEl ? namaEl.textContent : 'kartu' + i).replace(/[^a-zA-Z0-9 ]/g, '').trim().replace(/ +/g, '_');
  const noprint = unit.querySelectorAll('.no-print');
  noprint.forEach(e => e.style.visibility = 'hidden');
  const canvasD = await html2canvas(elD, { scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#f0ede8' });
  const blobD = await new Promise(r => canvasD.toBlob(r, 'image/jpeg', 0.94));
  noprint.forEach(e => e.style.visibility = '');
  if (!withBelakang) {
    const url = URL.createObjectURL(blobD);
    const a = document.createElement('a'); a.href = url; a.download = nama + '_' + nisn + '_depan.jpg'; a.click();
    URL.revokeObjectURL(url); return;
  }
  noprint.forEach(e => e.style.visibility = 'hidden');
  const canvasB = await html2canvas(elB, { scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#f0ede8' });
  const blobB = await new Promise(r => canvasB.toBlob(r, 'image/jpeg', 0.94));
  noprint.forEach(e => e.style.visibility = '');
  for (const u of [{ blob: blobD, name: nama + '_' + nisn + '_depan.jpg' }, { blob: blobB, name: nama + '_' + nisn + '_belakang.jpg' }]) {
    const url = URL.createObjectURL(u.blob);
    const a = document.createElement('a'); a.href = url; a.download = u.name; a.click();
    URL.revokeObjectURL(url);
    await new Promise(r => setTimeout(r, 300));
  }
}

async function downloadZip() {
  const mode = document.getElementById('zipMode').value;
  const target = selectedSet.size > 0
    ? tampilSiswa.filter(s => selectedSet.has(String(s.nisn)))
    : tampilSiswa;
  if (!target.length) { alert('Tidak ada kartu yang ditampilkan/dipilih.'); return; }
  const prog = document.getElementById('zipProgress');
  const bar = document.getElementById('zipBarFill');
  const msg = document.getElementById('zipMsg');
  const sub = document.getElementById('zipSub');
  prog.classList.add('show');
  const nisnToIdx = {};
  tampilSiswa.forEach((s, i) => { nisnToIdx[String(s.nisn)] = i; });
  const zip = new JSZip();
  const folderD = zip.folder('depan');
  const folderB = mode === 'both' ? zip.folder('belakang') : null;
  for (let t = 0; t < target.length; t++) {
    const s = target[t];
    const i = nisnToIdx[String(s.nisn)];
    bar.style.width = Math.round(t / target.length * 90) + '%';
    msg.textContent = 'Render ' + (t+1) + ' / ' + target.length;
    sub.textContent = s.nama;
    const elD = document.getElementById('depan-' + i);
    const elB = document.getElementById('belakang-' + i);
    if (!elD) continue;
    const unit = elD.closest('.kartu-unit');
    const noprint = unit.querySelectorAll('.no-print');
    noprint.forEach(e => e.style.visibility = 'hidden');
    try {
      const nama = s.nama.replace(/[^a-zA-Z0-9 ]/g, '').trim().replace(/ +/g, '_');
      const prefix = (t+1) + '_' + nama + '_' + s.nisn;
      const canvasD = await html2canvas(elD, { scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#f0ede8' });
      const blobD = await new Promise(r => canvasD.toBlob(r, 'image/jpeg', 0.92));
      folderD.file(prefix + '_depan.jpg', blobD);
      if (mode === 'both' && elB) {
        const canvasB = await html2canvas(elB, { scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#f0ede8' });
        const blobB = await new Promise(r => canvasB.toBlob(r, 'image/jpeg', 0.92));
        folderB.file(prefix + '_belakang.jpg', blobB);
      }
    } catch(e) { console.error(s.nama, e); }
    noprint.forEach(e => e.style.visibility = '');
    await new Promise(r => setTimeout(r, 10));
  }
  bar.style.width = '95%'; msg.textContent = 'Mengemas ZIP...'; sub.textContent = '';
  const zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } },
    meta => { bar.style.width = (95 + meta.percent * 0.05) + '%'; });
  bar.style.width = '100%'; msg.textContent = 'Selesai!';
  const url = URL.createObjectURL(zipBlob);
  const a = document.createElement('a'); a.href = url; a.download = 'kartu-' + tipeKartu + '-smpn05.zip'; a.click();
  URL.revokeObjectURL(url);
  setTimeout(() => prog.classList.remove('show'), 1200);
}
</script>
</body>
</html>
