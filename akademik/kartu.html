<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak Kartu — SMPN 05 Sarolangun</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --teal:#0a7566;--teal2:#0d8a7a;--merah:#c0392b;
  --putaka:#7b3fa0;--putaka2:#9b59b6;
  --biru:#1565c0;--abu:#f5f7fa;--teks:#1e2a3a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#eef2f7;color:var(--teks);}

/* TOPBAR */
.topbar{
  background:linear-gradient(135deg,var(--teal),#0d3b6e);
  padding:14px 24px;display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 16px rgba(0,0,0,0.2);flex-wrap:wrap;
}
.topbar-title strong{display:block;font-size:14px;font-weight:800;color:#fff;}
.topbar-title span{font-size:11px;color:rgba(255,255,255,0.7);}
.topbar a{margin-left:auto;color:rgba(255,255,255,0.8);text-decoration:none;font-size:13px;font-weight:600;}

/* KONTROL */
.kontrol{
  max-width:1100px;margin:20px auto;padding:0 20px;
  display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;
}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:11px;font-weight:700;color:#5a6a7e;text-transform:uppercase;letter-spacing:0.8px;}
.fg input,.fg select{
  padding:9px 12px;border:2px solid #dde3ee;border-radius:9px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;outline:none;
  background:#fff;transition:border-color 0.2s;
}
.fg input:focus,.fg select:focus{border-color:var(--teal2);}
.btn{
  padding:9px 18px;border:none;border-radius:9px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;
  font-weight:700;cursor:pointer;transition:all 0.2s;
}
.btn-tipe{background:#0d3b6e;color:#fff;}
.btn-tipe:hover{background:#092d54;}
.btn-print{background:var(--merah);color:#fff;}
.btn-print:hover{background:#a93226;}
.btn-zip{background:#27ae60;color:#fff;}
.btn-zip:hover{background:#219a52;}
.btn-upload-foto{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 14px;background:#e67e22;color:#fff;
  border-radius:9px;font-size:12px;font-weight:700;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;border:none;
}
.btn-upload-foto:hover{background:#d35400;}
.tipe-toggle{display:flex;gap:6px;}
.tipe-btn{
  padding:9px 16px;border:2px solid #dde3ee;background:#fff;
  border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;color:#5a6a7e;transition:all 0.2s;
}
.tipe-btn.active.pelajar{background:var(--teal2);color:#fff;border-color:var(--teal2);}
.tipe-btn.active.pustaka{background:var(--putaka2);color:#fff;border-color:var(--putaka2);}

/* INFO */
.info-bar{
  max-width:1100px;margin:0 auto 12px;padding:0 20px;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;
}
.info-count{font-size:13px;color:#5a6a7e;}
.info-count strong{color:var(--teal2);}
.info-selected{font-size:12px;color:#27ae60;font-weight:700;}

/* CHECKBOX PANEL */
.checkbox-panel{
  max-width:1100px;margin:0 auto 12px;padding:0 20px;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
}
.checkbox-panel label{font-size:12px;color:#5a6a7e;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.checkbox-panel input[type=checkbox]{cursor:pointer;width:14px;height:14px;}

/* AREA KARTU */
.kartu-area{
  max-width:1100px;margin:0 auto;padding:0 20px 40px;
  display:flex;flex-wrap:wrap;gap:16px;
}

/* Wrapper kartu (depan+belakang kiri-kanan) */
.kartu-unit{
  display:flex;flex-direction:column;gap:6px;
  position:relative;
}
.kartu-unit-header{
  display:flex;align-items:center;gap:8px;
  font-size:11px;font-weight:700;color:#9aabb8;
  text-transform:uppercase;letter-spacing:1px;
}
.kartu-unit-header input[type=checkbox]{cursor:pointer;width:14px;height:14px;}
.kartu-pair{display:flex;gap:6px;}

/* ═══ KARTU DEPAN — LAYOUT PERLI (foto kiri, info kanan) ═══ */
/* 86mm x 54mm → 323px x 204px (96dpi) */
.kartu-depan{
  width:323px;height:204px;
  border-radius:10px;overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,0.15);
  position:relative;background:#fff;
  flex-shrink:0;
}

/* Pelajar theme */
.pelajar .kartu-depan{background:#f5f9f8;}
/* Pustaka theme */
.pustaka .kartu-depan{background:#f8f5fc;}

/* Header teal (pelajar) / ungu (pustaka) */
.kd-header{
  position:absolute;top:0;left:0;right:0;height:72px;
  display:flex;align-items:center;padding:0 12px;gap:8px;
}
.pelajar .kd-header{background:linear-gradient(135deg,var(--teal) 0%,var(--teal2) 60%,#0d6e5a 100%);}
.pustaka .kd-header{background:linear-gradient(135deg,var(--putaka) 0%,var(--putaka2) 60%,#6c3483 100%);}

/* 1 logo saja (TWH), tanpa border lingkaran */
.kd-logo-wrap{
  width:48px;height:48px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.kd-logo-wrap img{width:48px;height:48px;object-fit:contain;}

/* Teks header */
.kd-header-txt{flex:1;min-width:0;}
.kd-header-txt .judul{font-size:8.5px;font-weight:800;color:#f8c400;letter-spacing:0.8px;text-transform:uppercase;}
.kd-header-txt .sekolah{font-size:9.5px;font-weight:800;color:#fff;line-height:1.2;}
.kd-header-txt .alamat{font-size:6px;color:rgba(255,255,255,0.82);line-height:1.4;margin-top:2px;}

/* Stripe merah + NISN */
.kd-stripe{
  position:absolute;top:72px;right:0;
  width:210px;height:22px;
  background:var(--merah);
  display:flex;align-items:center;padding:0 10px;
  clip-path:polygon(10px 0,100% 0,100% 100%,0 100%);
}
.pustaka .kd-stripe{background:var(--putaka);}
.kd-nisn-no{font-size:12px;font-weight:800;color:#fff;letter-spacing:1.5px;}

/* Foto */
.kd-foto{
  position:absolute;top:78px;left:8px;
  width:72px;height:96px;
  border:2px solid #ddd;background:#e8edf5;
  overflow:hidden;display:flex;align-items:center;justify-content:center;
}
.kd-foto img{width:100%;height:100%;object-fit:cover;}
.kd-foto .avatar{font-size:24px;font-weight:800;color:#fff;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.pelajar .kd-foto .avatar{background:linear-gradient(135deg,var(--teal),#0d3b6e);}
.pustaka .kd-foto .avatar{background:linear-gradient(135deg,var(--putaka),#4a235a);}

/* Data siswa (kanan foto) */
.kd-data{position:absolute;top:96px;left:90px;right:8px;}
.kd-nama{font-size:12px;font-weight:800;line-height:1.2;margin-bottom:3px;text-transform:uppercase;}
.pelajar .kd-nama{color:var(--teal);}
.pustaka .kd-nama{color:var(--putaka);}
.kd-nisn{font-size:8.5px;color:#333;margin-bottom:2px;}
.kd-ttl{font-size:8px;color:#444;line-height:1.5;}
.kd-kelas{display:inline-block;color:#fff;font-size:7.5px;font-weight:700;padding:2px 8px;border-radius:4px;margin-top:4px;}
.pelajar .kd-kelas{background:var(--teal);}
.pustaka .kd-kelas{background:var(--putaka);}

/* QR & Barcode bawah */
.kd-bottom{
  position:absolute;bottom:0;left:0;right:0;height:46px;
  display:flex;align-items:center;padding:0 8px;gap:6px;
}
.kd-barcode{flex:1;height:32px;overflow:hidden;}
.kd-barcode svg{width:100%;height:100%;}
.kd-qr{width:42px;height:42px;flex-shrink:0;}
.kd-qr canvas,.kd-qr img{width:42px!important;height:42px!important;}

/* Sekolah info kiri bawah di atas barcode */
.kd-sekolah{
  position:absolute;bottom:50px;right:50px;left:90px;
  font-size:6.5px;color:#666;text-align:right;line-height:1.4;
}
.kd-sekolah strong{color:#0d3b6e;font-size:7px;display:block;}

/* ═══ KARTU BELAKANG ═══ */
.kartu-belakang{
  width:323px;height:204px;
  border-radius:10px;overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,0.15);
  background:#fff;
  display:flex;flex-direction:column;
  flex-shrink:0;
}
.pelajar .kartu-belakang{background:#f5f9f8;}
.pustaka .kartu-belakang{background:#f8f5fc;}

/* Strip top */
.kb-top{height:10px;}
.pelajar .kb-top{background:linear-gradient(135deg,var(--teal),var(--teal2));}
.pustaka .kb-top{background:linear-gradient(135deg,var(--putaka),var(--putaka2));}
.kb-red{height:4px;background:var(--merah);}
.pustaka .kb-red{background:var(--putaka);}

/* Body belakang */
.kb-body{
  flex:1;display:flex;flex-direction:column;
  align-items:center;padding:6px 16px 0;
  position:relative;
}
.kb-watermark{
  position:absolute;top:5px;left:-10px;
  font-size:80px;font-weight:900;line-height:1;
  color:rgba(13,115,119,0.06);pointer-events:none;user-select:none;
  font-family:serif;
}
.pustaka .kb-watermark{color:rgba(123,63,160,0.06);}

.kb-logo{
  width:40px;height:40px;object-fit:contain;margin-bottom:4px;
}
.kb-rules{text-align:center;font-size:7px;color:#3a4a5a;line-height:1.75;}
.kb-rules p{margin-bottom:1px;}
.kb-rules .nama-sekolah{font-weight:800;}
.pelajar .kb-rules .nama-sekolah{color:var(--teal);}
.pustaka .kb-rules .nama-sekolah{color:var(--putaka);}

/* Kontak (kanan bawah) */
.kb-kontak{
  position:absolute;bottom:26px;right:12px;
  font-size:6.5px;color:#666;text-align:right;line-height:1.5;
}
.kb-kontak strong{display:block;font-size:7px;color:#0d3b6e;}

/* Footer merah */
.kb-footer{background:var(--merah);padding:5px 10px;}
.pustaka .kb-footer{background:var(--putaka);}
.kb-footer-name{font-size:8px;font-weight:800;color:#fff;}
.kb-footer-addr{font-size:6px;color:rgba(255,255,255,0.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* PRINT */
@media print{
  html,body{margin:0;padding:0;background:#fff;}
  .topbar,.kontrol,.info-bar,.checkbox-panel,.kartu-unit-header,.no-print{display:none!important;}
  .kartu-area{max-width:none;padding:0;margin:0;gap:8px;}
  .kartu-unit{display:inline-flex!important;flex-direction:column;margin:2mm;page-break-inside:avoid;}
  .kartu-pair{display:flex;gap:4px;}
  .kartu-depan,.kartu-belakang{width:86mm!important;height:54mm!important;box-shadow:none!important;border-radius:0!important;}
}

/* Progress bar ZIP */
#zipProgress{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.6);z-index:9999;
  align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
#zipProgress.show{display:flex;}
#zipBar{
  width:360px;height:10px;background:#333;border-radius:8px;overflow:hidden;
}
#zipBarFill{height:100%;background:#27ae60;width:0%;transition:width 0.2s;}
#zipMsg{color:#fff;font-size:14px;font-weight:700;}
</style>
</head>
<body>

<!-- Progress ZIP -->
<div id="zipProgress">
  <div id="zipMsg">Menyiapkan file...</div>
  <div id="zipBar"><div id="zipBarFill"></div></div>
  <div style="color:rgba(255,255,255,0.7);font-size:12px;" id="zipSub"></div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">
    <strong>Cetak Kartu — SMP Negeri 05 Sarolangun</strong>
    <span>Kartu Pelajar & Kartu Pustaka</span>
  </div>
  <label class="btn-upload-foto" title="Upload foto siswa (nama file = NISN)">
    📷 Upload Foto
    <input type="file" id="inputFoto" accept="image/*" multiple style="display:none" onchange="handleUploadFoto(this)">
  </label>
  <span id="infoFoto" style="font-size:11px;color:rgba(255,255,255,0.7);"></span>
  <a href="absensi.html" class="no-print">← Absensi</a>
</div>

<!-- KONTROL -->
<div class="kontrol no-print">
  <div class="fg">
    <label>Tipe Kartu</label>
    <div class="tipe-toggle">
      <button class="tipe-btn active pelajar" id="btnPelajar" onclick="setTipe('pelajar')">🪪 Pelajar</button>
      <button class="tipe-btn pustaka" id="btnPustaka" onclick="setTipe('pustaka')">📚 Pustaka</button>
    </div>
  </div>
  <div class="fg">
    <label>Filter Kelas</label>
    <select id="filterKelas" onchange="filterSiswa()">
      <option value="">Semua Kelas</option>
    </select>
  </div>
  <div class="fg">
    <label>Cari Siswa</label>
    <input type="text" id="inputCari" placeholder="Nama atau NISN..." style="width:200px;" oninput="filterSiswa()">
  </div>
  <button class="btn btn-print no-print" onclick="window.print()">🖨️ Print</button>
  <button class="btn btn-zip no-print" onclick="downloadZip()">📦 Unduh ZIP (JPG)</button>
</div>

<!-- INFO + CHECKBOX PANEL -->
<div class="info-bar no-print">
  <div class="info-count" id="infoCount"></div>
  <div class="info-selected" id="infoSelected"></div>
</div>
<div class="checkbox-panel no-print">
  <label><input type="checkbox" id="cekSemua" onchange="toggleSemua(this)"> Pilih Semua Tampil</label>
  <span style="color:#ccc;">|</span>
  <span style="font-size:12px;color:#5a6a7e;">Centang kartu untuk unduh ZIP selektif</span>
</div>

<!-- AREA KARTU -->
<div class="kartu-area" id="kartuArea">
  <div style="text-align:center;padding:60px;color:#9aabb8;width:100%;">
    <div style="font-size:36px;margin-bottom:12px;">🔄</div>
    <p>Memuat data siswa...</p>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
// KONSTANTA
// ──────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyB2ESAAwcPW2vufabMbbLGkEEcp-_YksDtU_9QCW7_e5tXzxQA98TWfcR8HrqtiRaoJw/exec';
let TOKEN = sessionStorage.getItem('absensi_token') || localStorage.getItem('absensi_token_shared') || '';

const TWH_URL = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMjAgMTIwIj4KICA8Y2lyY2xlIGN4PSI2MCIgY3k9IjYwIiByPSI1OCIgZmlsbD0iIzE1NjVjMCIgc3Ryb2tlPSIjZmZmIiBzdHJva2Utd2lkdGg9IjIiLz4KICA8Y2lyY2xlIGN4PSI2MCIgY3k9IjYwIiByPSI1MCIgZmlsbD0iIzE5NzZkMiIvPgogIDwhLS0gQnVrdSAtLT4KICA8cmVjdCB4PSIzNSIgeT0iNjUiIHdpZHRoPSI1MCIgaGVpZ2h0PSI4IiByeD0iMiIgZmlsbD0iI2ZmZiIgb3BhY2l0eT0iMC45Ii8+CiAgPHBhdGggZD0iTTYwIDQ1IEw0MCA2NSBMODAgNjUgWiIgZmlsbD0iI2ZmZiIgb3BhY2l0eT0iMC44NSIvPgogIDwhLS0gQXBpIC0tPgogIDxlbGxpcHNlIGN4PSI2MCIgY3k9IjQyIiByeD0iNSIgcnk9IjgiIGZpbGw9IiNmZmQ2MDAiLz4KICA8ZWxsaXBzZSBjeD0iNjAiIGN5PSI0MCIgcng9IjMiIHJ5PSI1IiBmaWxsPSIjZmY4ZjAwIi8+CiAgPCEtLSBCdXJ1bmcga2lyaSAtLT4KICA8cGF0aCBkPSJNMjUgNTAgUTM1IDQyIDQ1IDQ4IiBzdHJva2U9IiNmZmYiIHN0cm9rZS13aWR0aD0iMi41IiBmaWxsPSJub25lIiBzdHJva2UtbGluZWNhcD0icm91bmQiLz4KICA8cGF0aCBkPSJNMjAgNDQgUTMwIDM2IDQyIDQ0IiBzdHJva2U9IiNmZmYiIHN0cm9rZS13aWR0aD0iMiIgZmlsbD0ibm9uZSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+CiAgPCEtLSBCdXJ1bmcga2FuYW4gLS0+CiAgPHBhdGggZD0iTTk1IDUwIFE4NSA0MiA3NSA0OCIgc3Ryb2tlPSIjZmZmIiBzdHJva2Utd2lkdGg9IjIuNSIgZmlsbD0ibm9uZSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+CiAgPHBhdGggZD0iTTEwMCA0NCBROTAgMzYgNzggNDQiIHN0cm9rZT0iI2ZmZiIgc3Ryb2tlLXdpZHRoPSIyIiBmaWxsPSJub25lIiBzdHJva2UtbGluZWNhcD0icm91bmQiLz4KICA8IS0tIFRla3MgLS0+CiAgPHRleHQgeD0iNjAiIHk9Ijg4IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjZmZmIiBmb250LXNpemU9IjciIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC13ZWlnaHQ9ImJvbGQiPlRVVCBXVVJJPC90ZXh0PgogIDx0ZXh0IHg9IjYwIiB5PSI5NyIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iI2ZmZiIgZm9udC1zaXplPSI3IiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtd2VpZ2h0PSJib2xkIj5IQU5EQVlBTkk8L3RleHQ+Cjwvc3ZnPg==';

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let allSiswa = [];
let tampilSiswa = [];
let tipeKartu = 'pelajar';
const fotoMap = {};
const selectedSet = new Set();

// ──────────────────────────────────────────────
// HELPER
// ──────────────────────────────────────────────
function formatTgl(tgl) {
  if (!tgl) return '';
  const bln = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const d = new Date(tgl);
  if (!isNaN(d.getTime())) return d.getDate() + ' ' + bln[d.getMonth()] + ' ' + d.getFullYear();
  return tgl;
}

function updateSelectedInfo() {
  const el = document.getElementById('infoSelected');
  if (selectedSet.size > 0) el.textContent = `✅ ${selectedSet.size} kartu dipilih`;
  else el.textContent = '';
}

// ──────────────────────────────────────────────
// FOTO UPLOAD
// ──────────────────────────────────────────────
function handleUploadFoto(input) {
  const files = Array.from(input.files);
  let loaded = 0;
  const info = document.getElementById('infoFoto');
  info.textContent = '⏳ ' + files.length + ' foto...';
  files.forEach(file => {
    const nisn = file.name.replace(/\.[^.]+$/, '').trim();
    const reader = new FileReader();
    reader.onload = e => {
      fotoMap[nisn] = e.target.result;
      fotoMap[nisn.replace(/^0+/,'')] = e.target.result;
      loaded++;
      if (loaded === files.length) {
        info.textContent = '✅ ' + Object.keys(fotoMap).length + ' foto siap';
        renderKartu(tampilSiswa);
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

// ──────────────────────────────────────────────
// INIT / LOAD
// ──────────────────────────────────────────────
if (!TOKEN) { window.location.href = 'login.html'; }

window.addEventListener('load', async () => { await muatSiswa(); });

async function muatSiswa() {
  try {
    const r = await fetch(`${SCRIPT_URL}?action=getSiswa&token=${TOKEN}`);
    const d = await r.json();
    if (!d.ok) { window.location.href = 'login.html'; return; }
    allSiswa = d.data;
    const kelas = [...new Set(allSiswa.map(s=>s.kelas).filter(Boolean))].sort();
    const sel = document.getElementById('filterKelas');
    kelas.forEach(k => {
      const opt = document.createElement('option');
      opt.value = k; opt.textContent = k; sel.appendChild(opt);
    });
    tampilSiswa = allSiswa;
    renderKartu(tampilSiswa);
  } catch(e) {
    document.getElementById('kartuArea').innerHTML =
      '<div style="text-align:center;padding:40px;color:#e53935;">Gagal memuat data. Pastikan URL script sudah diisi.</div>';
  }
}

// ──────────────────────────────────────────────
// FILTER & TIPE
// ──────────────────────────────────────────────
function setTipe(tipe) {
  tipeKartu = tipe;
  document.getElementById('btnPelajar').className = 'tipe-btn pelajar' + (tipe==='pelajar' ? ' active' : '');
  document.getElementById('btnPustaka').className = 'tipe-btn pustaka' + (tipe==='pustaka' ? ' active' : '');
  renderKartu(tampilSiswa);
}

function filterSiswa() {
  const query = document.getElementById('inputCari').value.toLowerCase();
  const kelas = document.getElementById('filterKelas').value;
  tampilSiswa = allSiswa.filter(s =>
    (!query || s.nama.toLowerCase().includes(query) || String(s.nisn).includes(query)) &&
    (!kelas || s.kelas === kelas)
  );
  renderKartu(tampilSiswa);
}

// ──────────────────────────────────────────────
// CHECKBOX
// ──────────────────────────────────────────────
function toggleSiswa(nisn, checked) {
  if (checked) selectedSet.add(nisn);
  else selectedSet.delete(nisn);
  updateSelectedInfo();
}

function toggleSemua(cb) {
  tampilSiswa.forEach(s => {
    if (cb.checked) selectedSet.add(String(s.nisn));
    else selectedSet.delete(String(s.nisn));
  });
  document.querySelectorAll('.cb-siswa').forEach(c => c.checked = cb.checked);
  updateSelectedInfo();
}

// ──────────────────────────────────────────────
// RENDER KARTU
// ──────────────────────────────────────────────
function renderKartu(data) {
  const area = document.getElementById('kartuArea');
  document.getElementById('infoCount').innerHTML =
    `Menampilkan <strong>${data.length}</strong> dari <strong>${allSiswa.length}</strong> siswa`;

  if (!data.length) {
    area.innerHTML = '<div style="text-align:center;padding:40px;color:#9aabb8;width:100%;">Tidak ada siswa ditemukan</div>';
    return;
  }

  area.innerHTML = data.map((s,i) => buatKartuHTML(s, i)).join('');

  data.forEach((s, i) => {
    // QR Code depan
    const qrEl = document.getElementById(`qr-${i}`);
    if (qrEl) {
      qrEl.innerHTML = '';
      new QRCode(qrEl, { text: String(s.nisn), width:42, height:42, colorDark:'#000', colorLight:'#fff', correctLevel:QRCode.CorrectLevel.M });
    }
    // Barcode depan
    const bcEl = document.getElementById(`bc-${i}`);
    if (bcEl) {
      try { JsBarcode(bcEl, String(s.nisn), { format:'CODE128', width:1.1, height:26, displayValue:false, margin:0, lineColor:'#1e2a3a' }); } catch(e){}
    }
  });

  updateSelectedInfo();
}

function buatKartuHTML(s, i) {
  const tipe = tipeKartu;
  const cls = tipe; // 'pelajar' | 'pustaka'
  const labelKartu = tipe === 'pelajar' ? 'KARTU PELAJAR' : 'KARTU PUSTAKA';
  const inisial = s.nama.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
  const nisnStr = String(s.nisn||'');
  const fotoSrc = fotoMap[nisnStr] || fotoMap[nisnStr.replace(/^0+/,'')] || s.fotoUrl || '';
  const fotoHtml = fotoSrc
    ? `<img src="${fotoSrc}" alt="${s.nama}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
       <div class="avatar" style="display:none;">${inisial}</div>`
    : `<div class="avatar">${inisial}</div>`;

  const ttl = (s.tempatLahir ? s.tempatLahir + ', ' : '') + (formatTgl(s.tglLahir) || s.tglLahir || '');
  const isChecked = selectedSet.has(nisnStr) ? 'checked' : '';

  return `
  <div class="kartu-unit ${cls}" data-nisn="${nisnStr}">
    <div class="kartu-unit-header no-print">
      <input type="checkbox" class="cb-siswa" ${isChecked} onchange="toggleSiswa('${nisnStr}',this.checked)">
      <span>${s.nama} · ${s.kelas}</span>
    </div>
    <div class="kartu-pair">

      <!-- DEPAN -->
      <div class="kartu-depan" id="depan-${i}">
        <!-- Header -->
        <div class="kd-header">
          <div class="kd-logo-wrap">
            <img src="${TWH_URL}" alt="TWH">
          </div>
          <div class="kd-header-txt">
            <div class="judul">${labelKartu}</div>
            <div class="sekolah">SMP NEGERI 05 SAROLANGUN</div>
            <div class="alamat">Jl. Diponegoro No. 01 Desa Bukit Talang Mas, Kec. Singkut, Kab. Sarolangun Prov. Jambi</div>
          </div>
        </div>
        <!-- NISN stripe -->
        <div class="kd-stripe">
          <span class="kd-nisn-no">${s.nisn}</span>
        </div>
        <!-- Foto -->
        <div class="kd-foto">${fotoHtml}</div>
        <!-- Data -->
        <div class="kd-data">
          <div class="kd-nama">${s.nama}</div>
          <div class="kd-nisn">${s.nisn}</div>
          <div class="kd-ttl">${ttl}</div>
          <div class="kd-kelas">Kelas ${s.kelas}</div>
        </div>
        <!-- Info sekolah -->
        <div class="kd-sekolah">
          <strong>SMP NEGERI 05 SAROLANGUN</strong>
          smpn5sarolangun@gmail.com
        </div>
        <!-- Barcode + QR bawah -->
        <div class="kd-bottom">
          <div class="kd-barcode"><svg id="bc-${i}"></svg></div>
          <div class="kd-qr" id="qr-${i}"></div>
        </div>
      </div>

      <!-- BELAKANG -->
      <div class="kartu-belakang" id="belakang-${i}">
        <div class="kb-top"></div>
        <div class="kb-red"></div>
        <div class="kb-body">
          <div class="kb-watermark">TUT</div>
          <img class="kb-logo" src="${TWH_URL}" alt="Logo">
          <div class="kb-rules">
            <p>Kartu ${tipe === 'pelajar' ? 'Pelajar' : 'Pustaka'} ini wajib dibawa setiap hari untuk proses ${tipe === 'pelajar' ? 'absensi' : 'peminjaman buku'}.</p>
            <p>Kartu ini berlaku selama pemilik berstatus sebagai siswa <span class="nama-sekolah">SMP NEGERI 5 SAROLANGUN</span></p>
            <p>Kartu ini tidak boleh berpindah milik.</p>
            <p>Apabila kehilangan/menemukan kartu ini, segera hubungi kontak sekolah.</p>
          </div>
          <div class="kb-kontak">
            <strong>SMP NEGERI 05 SAROLANGUN</strong>
            smpn5sarolangun@gmail.com
          </div>
        </div>
        <div class="kb-footer">
          <div class="kb-footer-name">SMP NEGERI 5 SAROLANGUN</div>
          <div class="kb-footer-addr">Jalan Diponegoro No 1 Desa Bukit Talang Mas, Kecamatan Singkut, Kabupaten Sarolangun</div>
        </div>
      </div>

    </div><!-- .kartu-pair -->
  </div><!-- .kartu-unit -->`;
}

// ──────────────────────────────────────────────
// DOWNLOAD ZIP
// ──────────────────────────────────────────────
async function downloadZip() {
  // Tentukan kartu yang di-render: jika ada yang dipilih, gunakan itu; kalau tidak, semua tampil
  const target = selectedSet.size > 0
    ? tampilSiswa.filter(s => selectedSet.has(String(s.nisn)))
    : tampilSiswa;

  if (!target.length) { alert('Tidak ada kartu yang ditampilkan/dipilih.'); return; }

  const prog = document.getElementById('zipProgress');
  const bar = document.getElementById('zipBarFill');
  const msg = document.getElementById('zipMsg');
  const sub = document.getElementById('zipSub');
  prog.classList.add('show');
  bar.style.width = '0%';
  msg.textContent = 'Menyiapkan ZIP...';

  // Map NISN → index di DOM (yang sudah di-render)
  const nisnToIdx = {};
  tampilSiswa.forEach((s,i) => { nisnToIdx[String(s.nisn)] = i; });

  const zip = new JSZip();
  const folderD = zip.folder('depan');
  const folderB = zip.folder('belakang');

  for (let t = 0; t < target.length; t++) {
    const s = target[t];
    const i = nisnToIdx[String(s.nisn)];
    const pct = Math.round((t / target.length) * 90);
    bar.style.width = pct + '%';
    msg.textContent = `Render ${t+1} / ${target.length}`;
    sub.textContent = s.nama;

    const elD = document.getElementById('depan-' + i);
    const elB = document.getElementById('belakang-' + i);
    if (!elD || !elB) continue;

    try {
      // Sembunyikan elemen no-print sebelum capture
      const noprint = elD.closest('.kartu-unit').querySelectorAll('.no-print');
      noprint.forEach(e => e.style.visibility = 'hidden');

      const [canvasD, canvasB] = await Promise.all([
        html2canvas(elD, { scale:2, useCORS:true, allowTaint:true, backgroundColor:'#ffffff' }),
        html2canvas(elB, { scale:2, useCORS:true, allowTaint:true, backgroundColor:'#ffffff' })
      ]);

      noprint.forEach(e => e.style.visibility = '');

      const nama = s.nama.replace(/[^a-zA-Z0-9 ]/g,'').trim().replace(/ +/g,'_');
      const prefix = `${nisnToIdx[String(s.nisn)]+1}_${nama}_${s.nisn}`;

      const blobD = await new Promise(res => canvasD.toBlob(res, 'image/jpeg', 0.92));
      const blobB = await new Promise(res => canvasB.toBlob(res, 'image/jpeg', 0.92));

      folderD.file(`${prefix}_depan.jpg`, blobD);
      folderB.file(`${prefix}_belakang.jpg`, blobB);
    } catch(e) { console.error('Gagal render', s.nama, e); }

    // Yield ke browser
    await new Promise(r => setTimeout(r, 10));
  }

  bar.style.width = '95%';
  msg.textContent = 'Mengemas ZIP...';
  sub.textContent = '';

  const zipBlob = await zip.generateAsync({ type:'blob', compression:'DEFLATE', compressionOptions:{level:6} },
    (meta) => { bar.style.width = (95 + meta.percent * 0.05) + '%'; });

  bar.style.width = '100%';
  msg.textContent = 'Selesai! Mengunduh...';

  const url = URL.createObjectURL(zipBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kartu-${tipeKartu}-smpn5sarolangun.zip`;
  a.click();
  URL.revokeObjectURL(url);

  setTimeout(() => { prog.classList.remove('show'); }, 1200);
}
</script>
