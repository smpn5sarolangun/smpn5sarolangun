<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak Kartu — SMPN 05 Sarolangun</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
:root{
  --teal:#0d6e7a;--teal2:#0a7e8c;--merah:#c0392b;
  --biru:#1565c0;--abu:#f5f7fa;--teks:#1e2a3a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f4f8;color:var(--teks);}

/* TOPBAR */
.topbar{
  background:linear-gradient(135deg,var(--teal),#0d3b6e);
  padding:16px 24px;display:flex;align-items:center;gap:14px;
  box-shadow:0 2px 16px rgba(0,0,0,0.2);
}
.topbar img{width:40px;height:40px;object-fit:contain;}
.topbar-title strong{display:block;font-size:15px;font-weight:800;color:#fff;}
.topbar-title span{font-size:11px;color:rgba(255,255,255,0.7);}
.topbar a{margin-left:auto;color:rgba(255,255,255,0.8);text-decoration:none;font-size:13px;font-weight:600;}

/* KONTROL */
.kontrol{
  max-width:900px;margin:24px auto;padding:0 24px;
  display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;
}
.fg{display:flex;flex-direction:column;gap:6px;}
.fg label{font-size:11px;font-weight:700;color:#5a6a7e;text-transform:uppercase;letter-spacing:0.8px;}
.fg input,.fg select{
  padding:10px 14px;border:2px solid #dde3ee;border-radius:10px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;
  background:#fff;transition:border-color 0.2s;
}
.fg input:focus,.fg select:focus{border-color:var(--teal2);}
.btn{
  padding:10px 22px;border:none;border-radius:10px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;
  font-weight:700;cursor:pointer;transition:all 0.2s;
}
.btn-cari{background:var(--teal2);color:#fff;}
.btn-cari:hover{background:var(--teal);}
.btn-semua{background:#0d3b6e;color:#fff;}
.btn-print{background:var(--merah);color:#fff;}
.btn-print:hover{background:#a93226;}
.tipe-toggle{display:flex;gap:8px;}
.tipe-btn{
  padding:10px 18px;border:2px solid #dde3ee;background:#fff;
  border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;color:#5a6a7e;transition:all 0.2s;
}
.tipe-btn.active{background:var(--teal2);color:#fff;border-color:var(--teal2);}

/* INFO */
.info{
  max-width:900px;margin:0 auto 16px;padding:0 24px;
  font-size:13px;color:#5a6a7e;
}
.info strong{color:var(--teal2);}

/* ═══ AREA KARTU ═══ */
.kartu-area{
  max-width:900px;margin:0 auto;padding:0 24px 40px;
  display:flex;flex-wrap:wrap;gap:20px;
}

/* Wrapper kartu (depan+belakang dalam 1 unit) */
.kartu-unit{
  display:flex;flex-direction:column;gap:8px;
}
.kartu-label{
  font-size:11px;font-weight:700;color:#9aabb8;text-align:center;
  text-transform:uppercase;letter-spacing:1px;
}

/* ═══ KARTU DEPAN ═══ */
/* Ukuran ID Card standard: 85.6mm x 54mm */
.kartu-depan{
  width:323px;height:204px;
  border-radius:10px;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
  position:relative;background:#f5f0e8;
  display:flex;font-family:'Plus Jakarta Sans',sans-serif;
  flex-shrink:0;
}

/* Header teal */
.kd-header{
  position:absolute;top:0;left:0;right:0;height:52px;
  background:linear-gradient(135deg,var(--teal),var(--teal2));
  display:flex;align-items:center;padding:0 12px;gap:8px;
}
.kd-header-logos{display:flex;align-items:center;gap:8px;}
.kd-header-logos img{width:34px;height:34px;object-fit:contain;}
.kd-header-text{flex:1;text-align:center;}
.kd-header-text .judul{
  font-size:8px;font-weight:800;color:#fff;
  text-transform:uppercase;letter-spacing:1px;line-height:1.3;
}
.kd-header-text .sub{font-size:7px;color:rgba(255,255,255,0.8);line-height:1.3;}

/* Stripe merah tipis */
.kd-stripe{
  position:absolute;top:52px;left:0;right:0;height:3px;background:var(--merah);
}

/* Foto siswa */
.kd-foto{
  position:absolute;top:62px;left:10px;
  width:60px;height:72px;
  border:2px solid #ddd;border-radius:4px;
  background:#e8edf5;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.kd-foto img{width:100%;height:100%;object-fit:cover;}
.kd-foto .avatar{
  font-size:28px;display:flex;align-items:center;
  justify-content:center;width:100%;height:100%;
  background:linear-gradient(135deg,var(--teal),#0d3b6e);
  color:#fff;font-weight:800;font-size:20px;
}

/* Data siswa */
.kd-data{
  position:absolute;top:62px;left:80px;right:8px;
}
.kd-nisn-badge{
  background:var(--merah);color:#fff;
  font-size:9px;font-weight:800;letter-spacing:1px;
  padding:3px 8px;border-radius:4px;
  display:inline-block;margin-bottom:5px;
}
.kd-nama{
  font-size:11px;font-weight:800;color:#1e2a3a;
  line-height:1.3;margin-bottom:3px;
  text-transform:uppercase;
}
.kd-ttl{font-size:8px;color:#5a6a7e;line-height:1.5;}
.kd-kelas{
  margin-top:4px;background:var(--teal);color:#fff;
  font-size:9px;font-weight:700;padding:2px 8px;
  border-radius:4px;display:inline-block;
}

/* QR Code -->
.kd-qr{
  position:absolute;bottom:8px;right:8px;
  width:44px;height:44px;
}
.kd-qr canvas,.kd-qr img{width:44px!important;height:44px!important;}

/* Barcode -->
.kd-barcode{
  position:absolute;bottom:6px;left:8px;right:60px;
}
.kd-barcode svg{width:100%;height:30px;}

/* Sekolah di barcode area */
.kd-sekolah{
  position:absolute;bottom:40px;left:80px;right:60px;
  font-size:7px;color:#5a6a7e;text-align:right;line-height:1.4;
}
.kd-sekolah strong{display:block;color:var(--teal);font-size:7.5px;}

/* Dekorasi diagonal kanan atas */
.kd-deko{
  position:absolute;top:0;right:0;width:50px;height:52px;
  overflow:hidden;pointer-events:none;
}
.kd-deko::before{
  content:'';position:absolute;
  top:-20px;right:-20px;
  width:80px;height:80px;
  background:rgba(255,255,255,0.08);
  transform:rotate(45deg);
}

/* ═══ KARTU BELAKANG ═══ */
.kartu-belakang{
  width:323px;height:204px;
  border-radius:10px;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
  background:#f5f0e8;
  display:flex;flex-direction:column;
  position:relative;flex-shrink:0;
}

/* Header belakang sama */
.kb-header{
  height:12px;
  background:linear-gradient(135deg,var(--teal),var(--teal2));
}
.kb-stripe{height:3px;background:var(--merah);}

/* Body belakang */
.kb-body{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:12px 20px;gap:6px;
  position:relative;
}

/* Watermark Tut Wuri */
.kb-watermark{
  position:absolute;left:-10px;top:50%;transform:translateY(-50%);
  width:110px;height:110px;opacity:0.08;pointer-events:none;
}
.kb-watermark img{width:100%;height:100%;}

/* Logo tengah -->
.kb-logo{width:38px;height:38px;object-fit:contain;}

/* Teks aturan -->
.kb-rules{text-align:center;}
.kb-rules p{
  font-size:7px;color:#3a4a5a;line-height:1.7;
  margin-bottom:2px;
}
.kb-rules p.bold{font-weight:700;}
.kb-rules .nama-sekolah{color:var(--teal);font-weight:800;}

/* Footer belakang -->
.kb-footer{
  background:var(--merah);
  padding:6px 12px;
}
.kb-footer strong{
  display:block;font-size:9px;font-weight:800;
  color:#fff;text-transform:uppercase;letter-spacing:0.5px;
}
.kb-footer span{font-size:7px;color:rgba(255,255,255,0.85);}

/* ═══ PRINT STYLES ═══ */
@media print{
  body{background:#fff;}
  .topbar,.kontrol,.info,.kartu-label{display:none!important;}
  .kartu-area{
    max-width:none;padding:0;margin:0;
    gap:10px;
  }
  .kartu-unit{page-break-inside:avoid;}
  .kartu-depan,.kartu-belakang{
    box-shadow:none;
    border:0.5px solid #ccc;
  }
  @page{margin:10mm;size:A4;}
}

.btn-upload-foto{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;background:#27ae60;color:#fff;
  border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.btn-upload-foto:hover{background:#219a52;}

/* ── KARTU 86x54mm ── */
.kartu-unit{display:inline-block;vertical-align:top;margin:4px;}
.kartu-label{font-size:11px;font-weight:600;color:#5a6a7e;text-align:center;margin-bottom:4px;}

/* DEPAN */
.kartu-depan{
  width:323px;height:204px;
  border-radius:10px;overflow:hidden;
  position:relative;background:#f0ede8;
  box-shadow:0 3px 12px rgba(0,0,0,0.15);
}
/* Header teal miring */
.kd-header{
  position:absolute;top:0;left:0;right:0;height:76px;
  background:linear-gradient(135deg,#0d7377 0%,#0a5e62 100%);
  clip-path:polygon(0 0,100% 0,100% 68%,0 100%);
  display:flex;align-items:flex-start;padding:8px 10px;gap:6px;
}
.kd-header::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(135deg,rgba(255,255,255,0.04) 0,rgba(255,255,255,0.04) 1px,transparent 1px,transparent 9px);
}
.kd-logos{display:flex;gap:4px;align-items:center;z-index:1;}
.kd-logos img{width:36px;height:36px;object-fit:contain;border-radius:50%;border:1.5px solid rgba(255,255,255,0.4);background:#fff;}
.kd-header-txt{z-index:1;flex:1;}
.kd-header-txt .judul{font-size:10px;font-weight:800;color:#f0a500;letter-spacing:0.5px;}
.kd-header-txt .sekolah{font-size:9px;font-weight:700;color:#fff;line-height:1.3;}
.kd-header-txt .alamat{font-size:6.5px;color:rgba(255,255,255,0.8);line-height:1.4;margin-top:1px;}
/* Stripe merah */
.kd-stripe{
  position:absolute;top:60px;right:0;
  width:180px;height:22px;
  background:#c0392b;
  display:flex;align-items:center;padding:0 10px;
  clip-path:polygon(12px 0,100% 0,100% 100%,0 100%);
}
.kd-nisn-stripe{font-size:12px;font-weight:700;color:#fff;letter-spacing:1px;}
/* Foto */
.kd-foto{
  position:absolute;top:78px;left:10px;
  width:62px;height:78px;
  border:2px solid #ddd;background:#e8edf5;
  overflow:hidden;display:flex;align-items:center;justify-content:center;
}
.kd-foto img{width:100%;height:100%;object-fit:cover;}
.kd-foto .avatar{font-size:22px;font-weight:800;color:#fff;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
/* Data siswa */
.kd-data{position:absolute;top:88px;left:82px;right:8px;}
.kd-nama{font-size:11px;font-weight:800;color:#0d7377;line-height:1.2;margin-bottom:3px;}
.kd-ttl{font-size:8.5px;color:#333;line-height:1.7;}
.kd-kelas{display:inline-block;background:#0d7377;color:#fff;font-size:7.5px;font-weight:700;padding:2px 8px;border-radius:4px;margin-top:3px;}
/* Info sekolah kanan bawah */
.kd-sekolah{
  position:absolute;bottom:28px;right:8px;
  text-align:right;font-size:7px;color:#555;line-height:1.5;
}
.kd-sekolah strong{display:block;color:#0d3b6e;font-size:7.5px;}
/* Barcode */
.kd-barcode{
  position:absolute;bottom:5px;left:82px;right:72px;height:24px;
}
.kd-barcode svg{width:100%;height:100%;}
/* QR */
.kd-qr{
  position:absolute;bottom:4px;right:6px;
  width:52px;height:52px;
}
.kd-qr img,.kd-qr canvas{width:100%;height:100%;}

/* BELAKANG */
.kartu-belakang{
  width:323px;height:204px;
  border-radius:10px;overflow:hidden;
  position:relative;background:#f0ede8;
  box-shadow:0 3px 12px rgba(0,0,0,0.15);
  margin-top:8px;
}
.kb-top-bar{position:absolute;top:0;left:0;right:0;height:12px;background:linear-gradient(135deg,#0d7377,#0a5e62);}
.kb-red-bar{position:absolute;top:8px;left:0;right:0;height:5px;background:#c0392b;}
.kb-watermark{
  position:absolute;top:10px;left:-15px;
  font-size:90px;font-weight:900;
  color:rgba(13,115,119,0.07);
  line-height:1;pointer-events:none;user-select:none;
  font-family:serif;
}
.kb-logo{
  position:absolute;top:18px;left:50%;transform:translateX(-50%);
  width:50px;height:50px;border-radius:50%;
  border:2px solid #ccc;background:#fff;overflow:hidden;
}
.kb-logo img{width:100%;height:100%;object-fit:contain;}
.kb-rules{
  position:absolute;top:72px;left:14px;right:14px;
  font-size:7.5px;color:#333;text-align:center;line-height:1.8;
}
.kb-rules p{margin-bottom:2px;}
.kb-rules .nama-sekolah{font-weight:700;color:#0d3b6e;}
.kb-kontak{
  position:absolute;bottom:30px;right:10px;
  font-size:6.5px;color:#666;text-align:right;line-height:1.6;
}
.kb-kontak strong{display:block;font-size:7.5px;color:#0d3b6e;}
.kb-footer{
  position:absolute;bottom:0;left:0;right:0;
  background:#c0392b;padding:5px 10px;
}
.kb-footer-name{font-size:8.5px;font-weight:800;color:#fff;}
.kb-footer-addr{font-size:6.5px;color:rgba(255,255,255,0.85);}

/* PRINT */
@media print{
  html,body{margin:0;padding:0;background:#fff;}
  .topbar,.kontrol,.kartu-label,.no-print{display:none!important;}
  .kartu-unit{display:inline-flex!important;flex-direction:column;margin:2mm;page-break-inside:avoid;}
  .kartu-depan,.kartu-belakang{width:86mm!important;height:54mm!important;box-shadow:none!important;border-radius:0!important;}
}
</style>
</head>

<script>
function formatTgl(tgl) {
  if (!tgl) return '';
  const bln = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const d = new Date(tgl);
  if (!isNaN(d.getTime())) return d.getDate() + ' ' + bln[d.getMonth()] + ' ' + d.getFullYear();
  return tgl;
}

// ── FOTO MAP (NISN → dataURL) ──
const fotoMap = {};

function handleUploadFoto(input) {
  const files = Array.from(input.files);
  let loaded = 0;
  const info = document.getElementById('infoFoto');
  info.textContent = '⏳ Memuat ' + files.length + ' foto...';
  
  files.forEach(file => {
    // Nama file tanpa ekstensi = NISN
    const nisn = file.name.replace(/\.[^.]+$/, '').trim();
    const reader = new FileReader();
    reader.onload = e => {
      fotoMap[nisn] = e.target.result;
      loaded++;
      if (loaded === files.length) {
        info.textContent = '✅ ' + Object.keys(fotoMap).length + ' foto siap';
        // Re-render kartu dengan foto baru
        const filtered = getFilteredSiswa();
        renderKartu(filtered);
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = ''; // reset input
}


function getFilteredSiswa() {
  const kelas = document.getElementById('filterKelas') ? document.getElementById('filterKelas').value : '';
  const cari  = document.getElementById('inputCari') ? document.getElementById('inputCari').value.toLowerCase() : '';
  return allSiswa.filter(s => {
    if (kelas && s.kelas !== kelas) return false;
    if (cari && !s.nama.toLowerCase().includes(cari) && !String(s.nisn).includes(cari)) return false;
    return true;
  });
}

let allSiswa = [];
let tampilSiswa = [];
let tipeKartu = 'pelajar';

// Cek login - coba sessionStorage dulu, lalu localStorage
if (!TOKEN) {
  TOKEN = localStorage.getItem('absensi_token_shared');
}
if (!TOKEN) {
  // Minta token dari sessionStorage via broadcast
  window.location.href = 'login.html';
}

window.addEventListener('load', async () => {
  await muatSiswa();
});

async function muatSiswa() {
  try {
    const r = await fetch(`${SCRIPT_URL}?action=getSiswa&token=${TOKEN}`);
    const d = await r.json();
    if (!d.ok) { window.location.href = 'login.html'; return; }
    allSiswa = d.data;
    
    // Isi dropdown kelas
    const kelas = [...new Set(allSiswa.map(s=>s.kelas).filter(Boolean))].sort();
    const sel = document.getElementById('filterKelas');
    kelas.forEach(k => {
      const opt = document.createElement('option');
      opt.value = k; opt.textContent = k;
      sel.appendChild(opt);
    });
    
    tampilSiswa = allSiswa;
    renderKartu(tampilSiswa);
  } catch(e) {
    document.getElementById('kartuArea').innerHTML = 
      '<div style="text-align:center;padding:40px;color:#e53935;">Gagal memuat data. Pastikan URL script sudah diisi.</div>';
  }
}

function setTipe(tipe) {
  tipeKartu = tipe;
  document.getElementById('btnPelajar').classList.toggle('active', tipe==='pelajar');
  document.getElementById('btnPustaka').classList.toggle('active', tipe==='pustaka');
  renderKartu(tampilSiswa);
}

function filterSiswa(q) {
  const query = (q || document.getElementById('inputCari').value).toLowerCase();
  const kelas = document.getElementById('filterKelas').value;
  tampilSiswa = allSiswa.filter(s =>
    (!query || s.nama.toLowerCase().includes(query) || s.nisn.includes(query)) &&
    (!kelas || s.kelas === kelas)
  );
  renderKartu(tampilSiswa);
}

function cetakSemua() {
  if (!tampilSiswa.length) { alert('Tidak ada siswa yang ditampilkan'); return; }
  renderKartu(tampilSiswa);
  setTimeout(() => window.print(), 800);
}

function renderKartu(data) {
  const area = document.getElementById('kartuArea');
  document.getElementById('infoCount').innerHTML = 
    `Menampilkan <strong>${data.length}</strong> kartu dari total <strong>${allSiswa.length}</strong> siswa`;

  if (!data.length) {
    area.innerHTML = '<div style="text-align:center;padding:40px;color:#9aabb8;width:100%;">Tidak ada siswa yang cocok</div>';
    return;
  }

  area.innerHTML = data.map((s,i) => buatKartuHTML(s, i)).join('');

  // Generate QR dan Barcode setelah render
  data.forEach((s, i) => {
    // QR Code
    const qrEl = document.getElementById(`qr-${i}`);
    if (qrEl) {
      qrEl.innerHTML = '';
      new QRCode(qrEl, {
        text: s.nisn,
        width: 44, height: 44,
        colorDark:'#000', colorLight:'#fff',
        correctLevel: QRCode.CorrectLevel.M
      });
    }
    // Barcode
    const bcEl = document.getElementById(`bc-${i}`);
    if (bcEl) {
      JsBarcode(bcEl, s.nisn, {
        format:'CODE128', width:1.2, height:28,
        displayValue:false, margin:0,
        lineColor:'#1e2a3a'
      });
    }
  });
}

function buatKartuHTML(s, i) {
  const inisial = s.nama.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  const warnaAvatar = ['#0a7e8c','#0d3b6e','#1a7a4a','#7d3c98','#c0392b','#e67e22'];
  const wAvatar = warnaAvatar[s.nisn.charCodeAt(s.nisn.length-1) % warnaAvatar.length];
  
  const nisnStr = String(s.nisn||'');
  const fotoSrc = fotoMap[nisnStr] || fotoMap[nisnStr.replace(/^0+/,'')] || s.fotoUrl || '';
  const fotoHtml = fotoSrc
    ? `<img src="${fotoSrc}" alt="${s.nama}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
       <div class="avatar" style="background:${wAvatar};display:none;">${inisial}</div>`
    : `<div class="avatar" style="background:${wAvatar};">${inisial}</div>`;

  const ttl = (s.tempatLahir ? s.tempatLahir + ', ' : '') + (formatTgl(s.tglLahir) || s.tglLahir || '');

  return `
  <div class="kartu-unit">
    <div class="kartu-label">${s.nama} · ${s.kelas}</div>

    <!-- DEPAN -->
    <div class="kartu-depan">
      <!-- Header teal -->
      <div class="kd-header">
        <div class="kd-logos">
          <img src="${TWH_URL}" alt="TWH">
          <img src="${LOGO_URL}" alt="Logo">
        </div>
        <div class="kd-header-txt">
          <div class="judul">KARTU PELAJAR</div>
          <div class="sekolah">SMP NEGERI 05 SAROLANGUN</div>
          <div class="alamat">Jl. Diponegoro No. 01 Desa Bukit Talang Mas, Kec. Singkut, Kab.<br>Sarolangun Prov. Jambi</div>
        </div>
      </div>
      <!-- NISN banner merah -->
      <div class="kd-stripe">
        <span class="kd-nisn-stripe">${s.nisn}</span>
